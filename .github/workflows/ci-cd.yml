name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort
          pip install -r requirements.txt

      - name: 运行Black格式检查
        run: black --check --diff .

      - name: 运行isort导入检查
        run: isort --check-only --diff .

      - name: 运行Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: 运行测试
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html || true

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: htmlcov/
          retention-days: 7

  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 验证主程序可运行
        run: python -c "import main; print('导入成功')"

  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/NGAStockAnalyze
            ./deploy/deploy.sh update
            ./deploy/deploy.sh restart

      - name: 通知部署结果
        if: always()
        run: |
          echo "Staging部署完成: ${{ job.status }}"

  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建部署标签
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          DEPLOY_TAG="deploy-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$DEPLOY_TAG" -m "Production deployment"
          git push origin "$DEPLOY_TAG" || true

      - name: 部署到生产服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/NGAStockAnalyze
            ./deploy/deploy.sh update
            ./deploy/deploy.sh restart

      - name: 健康检查
        run: |
          echo "等待服务启动..."
          sleep 10
          echo "生产环境部署完成"

      - name: 通知部署结果
        if: always()
        run: |
          echo "Production部署完成: ${{ job.status }}"
