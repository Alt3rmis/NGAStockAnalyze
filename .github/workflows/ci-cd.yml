name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
sudo chown -R $deploy-nga:$USER /opt/NGAStockAnalyze

env:
  PYTHON_VERSION: '3.11'
  DEPLOY_PATH: ${{ secrets.NGA_DEPLOY_PATH || '/opt/NGAStockAnalyze' }}

jobs:
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort
          pip install -r requirements.txt

      - name: Black Format Check
        run: black --check --diff .
        continue-on-error: true

      - name: isort Import Check
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Flake8 Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest --cov=. --cov-report=xml --cov-report=html || true
        continue-on-error: true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-nga
          path: htmlcov/
          retention-days: 7

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Import
        run: python -c "import main; print('Import successful')"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging-nga
      url: ${{ vars.NGA_STAGING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NGA_DEPLOY_HOST }}
          username: ${{ secrets.NGA_DEPLOY_USER }}
          port: ${{ secrets.NGA_DEPLOY_PORT || 22 }}
          key: ${{ secrets.NGA_DEPLOY_KEY }}
          script: |
            echo "=== Starting NGAStockAnalyze Staging Deployment ==="
            
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            REPO_SSH_URL="git@github.com:Alt3rmis/NGAStockAnalyze.git"
            
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Directory does not exist. Creating parent directories..."
              mkdir -p "$(dirname "$DEPLOY_PATH")"
            elif [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Directory exists but not a git repo. Cleaning up..."
              rm -rf "$DEPLOY_PATH"
            fi
            
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Cloning repository via SSH..."
              git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
            fi
            
            cd "$DEPLOY_PATH"
            
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            
            chmod +x deploy/deploy.sh
            
            echo "Current directory: $(pwd)"
            echo "Current user: $(whoami)"
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            if [ ! -d "venv" ]; then
              ./deploy/deploy.sh install
            else
              ./deploy/deploy.sh update
            fi
            
            ./deploy/deploy.sh restart
            ./deploy/deploy.sh status
            
            echo "=== Staging Deployment Complete ==="

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**: ${{ env.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-nga
      url: ${{ vars.NGA_PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Deployment Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          DEPLOY_TAG="nga-deploy-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$DEPLOY_TAG" -m "NGAStockAnalyze Production Deployment"
          git push origin "$DEPLOY_TAG" || true
          echo "DEPLOY_TAG=$DEPLOY_TAG" >> $GITHUB_ENV

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NGA_DEPLOY_HOST }}
          username: ${{ secrets.NGA_DEPLOY_USER }}
          port: ${{ secrets.NGA_DEPLOY_PORT || 22 }}
          key: ${{ secrets.NGA_DEPLOY_KEY }}
          script: |
            echo "=== Starting NGAStockAnalyze Production Deployment ==="
            
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            REPO_SSH_URL="git@github.com:Alt3rmis/NGAStockAnalyze.git"
            
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Directory does not exist. Creating parent directories..."
              mkdir -p "$(dirname "$DEPLOY_PATH")"
            elif [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Directory exists but not a git repo. Cleaning up..."
              rm -rf "$DEPLOY_PATH"
            fi
            
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Cloning repository via SSH..."
              git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
            fi
            
            cd "$DEPLOY_PATH"
            
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            
            chmod +x deploy/deploy.sh
            
            echo "Current directory: $(pwd)"
            echo "Current user: $(whoami)"
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            if [ ! -d "venv" ]; then
              ./deploy/deploy.sh install
            else
              ./deploy/deploy.sh update
            fi
            
            ./deploy/deploy.sh restart
            
            sleep 5
            ./deploy/deploy.sh status
            ./deploy/deploy.sh scheduler-update
            
            echo "=== Production Deployment Complete ==="

      - name: Health Check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          echo "Health check passed"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.DEPLOY_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**: ${{ env.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
